name: Daily Prediction Learning

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas

      - name: Run autonomous learner
        run: |
          python auto_learner.py

      - name: Commit updated prediction memory
        run: |
          git config --global user.name "AI Learner"
          git config --global user.email "actions@github.com"

          git add prediction_memory.json

          git diff --cached --quiet || git commit -m "Automatic prediction learning update"

          git push origin HEAD:${{ github.ref }}
