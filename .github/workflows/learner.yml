name: Daily Prediction Learning

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

jobs:
  learn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas

      - name: Run AI learner
        run: |
          python auto_learner.py

      - name: Save updated memory
        run: |
          git config --global user.name "AI Learner"
          git config --global user.email "actions@github.com"
          git add prediction_memory.json
          git commit -m "Automatic learning update" || exit 0
          git push
