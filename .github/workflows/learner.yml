name: Daily Prediction Learning

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * 1-5"

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas

      - name: Run learner
        run: |
          python auto_learner.py

      - name: Check memory file
        run: |
          ls -la
          cat prediction_memory.json || echo "No memory file found"

      - name: Commit memory update
        run: |
          git config user.name "AI Learner"
          git config user.email "actions@github.com"

          git add prediction_memory.json

          git status

          git commit -m "Automatic prediction learning update" || echo "No changes"

      - name: Push changes
        run: |
          git push
